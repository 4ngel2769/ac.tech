server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/rss+xml application/json image/svg+xml;

    # External IPX image fallback: if the prerendered file doesn't exist
    # (e.g. rate-limited at build time), redirect to the original external URL.
    # nginx normalises // in paths, so https:// arrives as https:/ for matching.
    location ~ "^/_ipx/[^/]+/(https?):/(.+)$" {
        set $ext_scheme $1;
        set $ext_rest   $2;
        try_files $uri @ipx_external_fallback;
    }
    location @ipx_external_fallback {
        return 302 $ext_scheme://$ext_rest;
    }

    # Handle SPA routing - try the file, then directory, then fallback to index.html
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # Nuxt payload files (any depth, e.g. /projects/foo/_payload.json)
    location ~* /_payload\.json$ {
        add_header Cache-Control "no-cache, must-revalidate";
        access_log off;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Disable access logs for common files
    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    # Custom error pages for SPA
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
}
